<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharp RP-117 Front Panel Interface</title>
<style>
  :root {
    --panel-bg: linear-gradient(180deg, #e4ded2 0%, #cfcaa3 40%, #bca584 100%);
    --brushed-tint: repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0px, rgba(255,255,255,0.08) 1px, transparent 1px, transparent 3px);
    --btn-silver: linear-gradient(180deg, #ffffff 0%, #eaeaea 25%, #d1d1d1 60%, #b5b5b5 100%);
    --btn-slate: linear-gradient(180deg, #a4a8ad 0%, #82868b 25%, #63676c 75%, #4e5156 100%);
    --display-bg: #0d0f0e;
    --led-green: #39ff14;
    --led-red: #ff3333;
    --text-dark: #24221f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body {
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    padding: 20px;
  }

  /* Main Chassis Faceplate */
  .faceplate {
    width: 860px;
    height: 190px;
    background: var(--panel-bg);
    position: relative;
    border: 2px solid #9e9a85;
    border-radius: 2px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.8);
    display: grid;
    grid-template-columns: 250px 340px 270px;
    padding: 15px 15px;
    overflow: hidden;
  }

  .faceplate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--brushed-tint);
    pointer-events: none;
  }

  /* Typography */
  .label {
    font-size: 8px;
    font-weight: bold;
    color: var(--text-dark);
    letter-spacing: 0.5px;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    line-height: 1.2;
  }

  /* LEFT SECTION */
  .left-section {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-right: 10px;
  }

  .brand-power-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .brand {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--text-dark);
    line-height: 1;
    margin-top: 4px;
  }

  .power-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .power-btn {
    width: 44px;
    height: 18px;
    background: #eaeaea;
    border: 1px solid #777;
    border-radius: 1px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 3px 4px rgba(0,0,0,0.4);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .power-btn::after {
    content: '';
    position: absolute;
    left: 4px; top: 3px; width: 3px; height: 10px;
    background: var(--led-red);
    opacity: 0.2;
  }

  .faceplate.power-on .power-btn {
    transform: scale(0.95);
    box-shadow: 0 1px 1px rgba(0,0,0,0.2), inset 0 2px 4px rgba(0,0,0,0.4);
    background: #cccccc;
  }
  .faceplate.power-on .power-btn::after {
    opacity: 1;
    box-shadow: 0 0 6px var(--led-red);
  }

  .apms-container {
    margin-top: 10px;
  }
  .apms-title {
    text-align: center;
    font-size: 7.5px;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .apms-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px 6px;
  }

  .apms-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .apms-btn {
    width: 44px;
    height: 13px;
    background: var(--btn-silver);
    border: 1px solid #7a7a7a;
    border-radius: 1px;
    cursor: pointer;
    box-shadow: 0 2px 2px rgba(0,0,0,0.3);
  }
  .apms-btn:active {
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    transform: translateY(0.5px);
  }

  /* CENTER SECTION */
  .center-container {
    position: relative;
    height: 100%;
    border: 2px solid #9c9782;
    background: #151515;
    overflow: hidden;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.9);
  }

  .drawer-tray {
    position: absolute;
    inset: 0;
    background: var(--panel-bg);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6px;
    transition: transform 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    z-index: 2;
    border: 1px solid #bca685;
  }
  
  .drawer-tray::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--brushed-tint);
    pointer-events: none;
  }

  .faceplate.tray-open .drawer-tray {
    transform: translateY(14px) scaleY(0.94) scaleX(0.98);
    box-shadow: 0 18px 30px rgba(0,0,0,0.95);
  }

  .display-window {
    width: 100%;
    height: 100%;
    background-color: var(--display-bg);
    border: 2px solid #5d5a4f;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0.15;
    transition: opacity 0.3s ease;
  }

  .faceplate.power-on .display-window {
    opacity: 1;
  }

  .radar-graphic {
    width: 90%;
    height: 80%;
  }

  /* RIGHT SECTION (FIXED & ALIGNED LAYOUT) */
  .right-section {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding-left: 15px;
  }

  /* Upper Controls Grid */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
  }

  .mode-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* Dedicated row height for upper labels to stop layout overlap */
  .mode-cell .label {
    height: 12px;
    margin-bottom: 5px;
    white-space: nowrap;
  }

  /* Rectangular buttons matching real gray/silver profiles */
  .rect-btn {
    width: 100%;
    height: 16px;
    background: var(--btn-slate);
    border: 1px solid #3c3f42;
    border-radius: 1px;
    cursor: pointer;
    box-shadow: 0 2px 3px rgba(0,0,0,0.35);
  }

  .rect-btn.loading-btn {
    background: var(--btn-silver);
    border: 1px solid #7a7a7a;
  }

  .rect-btn:active {
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    transform: translateY(0.5px);
  }

  /* Lower Controls Grid */
  .transport-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    align-items: flex-end;
  }

  .transport-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .transport-cell .label {
    margin-bottom: 4px;
  }

  .wide-btn {
    width: 100%;
    height: 13px;
    background: var(--btn-silver);
    border: 1px solid #7a7a7a;
    border-radius: 1px;
    cursor: pointer;
    box-shadow: 0 2px 2px rgba(0,0,0,0.3);
  }

  .wide-btn:active {
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    transform: translateY(0.5px);
  }

  /* Bottom Speed Area */
  .speed-container-row {
    grid-column: span 4;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    padding-right: 2px;
  }

  .speed-led {
    width: 5px;
    height: 5px;
    background-color: #44433e;
    border-radius: 50%;
    transition: background-color 0.15s, box-shadow 0.15s;
  }
  
  .faceplate.power-on .speed-led.active {
    background-color: var(--led-green);
    box-shadow: 0 0 6px var(--led-green);
  }

</style>
</head>
<body>

  <div class="faceplate" id="faceplate">
    
    <div class="left-section">
      <div class="brand-power-row">
        <div class="brand">SHARP</div>
        <div class="power-container">
          <span class="label">POWER</span>
          <button class="power-btn" id="powerBtn" title="Power Switch"></button>
          <span class="label" style="font-size: 5.5px; color:#4a463e; font-weight: normal; margin-top:2px;">ON/STAND-BY</span>
        </div>
      </div>

      <div class="apms-container">
        <div class="apms-grid">
          <div class="apms-cell"><span class="label">1</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">2</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">3</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">4</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">5</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">6</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label">7</span><button class="apms-btn"></button></div>
          <div class="apms-cell"><span class="label" style="font-size:6.5px;">CLEAR</span><button class="apms-btn"></button></div>
        </div>
        <div class="label apms-title">AUTOMATIC PROGRAMMABLE MUSIC SELECTOR</div>
      </div>
    </div>

    <div class="center-container">
      <div class="drawer-tray" id="drawerTray">
        <div class="display-window">
          <svg class="radar-graphic" viewBox="0 0 220 100">
            <g fill="none" stroke="#1b441b" stroke-width="1">
              <ellipse cx="110" cy="50" rx="95" ry="35" stroke="var(--led-green)" stroke-dasharray="2,2"/>
              <ellipse cx="110" cy="50" rx="80" ry="30" stroke="var(--led-green)"/>
              <ellipse cx="110" cy="50" rx="65" ry="25"/>
              <ellipse cx="110" cy="50" rx="50" ry="20"/>
              <ellipse cx="110" cy="50" rx="35" ry="15"/>
            </g>
            <circle cx="23" cy="50" r="1.5" fill="var(--led-red)" id="led-b" opacity="0.2"/>
            <circle cx="197" cy="50" r="1.5" fill="var(--led-green)" id="led-a" opacity="0.2"/>
            <text x="110" y="53" fill="#2d632d" font-size="8" font-family="monospace" text-anchor="middle" id="apms-text">APMS</text>
          </svg>
        </div>
      </div>
    </div>

    <div class="right-section">
      <div class="mode-grid">
        <div class="mode-cell">
          <span class="label">SIDE A / B</span>
          <button class="rect-btn" id="sideBtn"></button>
        </div>
        <div class="mode-cell">
          <span class="label">BOTH SIDES</span>
          <button class="rect-btn" id="bothSidesBtn"></button>
        </div>
        <div class="mode-cell">
          <span class="label">REPEAT</span>
          <button class="rect-btn"></button>
        </div>
        <div class="mode-cell">
          <span class="label">LOADING</span>
          <button class="rect-btn loading-btn" id="loadingBtn"></button>
        </div>
      </div>

      <div class="transport-grid">
        <div class="transport-cell"><span class="label">FWD</span><button class="wide-btn"></button></div>
        <div class="transport-cell"><span class="label">REV</span><button class="wide-btn"></button></div>
        <div class="transport-cell"><span class="label">CUE</span><button class="wide-btn"></button></div>
        <div class="transport-cell"><span class="label" style="letter-spacing: -0.3px;">PLAY/CUT</span><button class="wide-btn"></button></div>
        
        <div class="speed-container-row">
          <span class="label" style="font-size: 7.5px; margin-right: 2px;">SPEED</span>
          <div class="speed-led active" id="led33"></div>
          <span class="label" style="font-size: 7.5px; width: 12px; text-align: left;">33</span>
          <div class="speed-led" id="led45"></div>
          <span class="label" style="font-size: 7.5px; width: 12px; text-align: left;">45</span>
        </div>
      </div>
    </div>

  </div>

  <script>
    const faceplate = document.getElementById('faceplate');
    const powerBtn = document.getElementById('powerBtn');
    const loadingBtn = document.getElementById('loadingBtn');
    const ledA = document.getElementById('led-a');
    const ledB = document.getElementById('led-b');
    const apmsText = document.getElementById('apms-text');
    const led33 = document.getElementById('led33');
    const led45 = document.getElementById('led45');

    let isPowerOn = false;
    let isTrayOpen = false;
    let dynamicSpeed = 33;

    // Power Toggle 
    powerBtn.addEventListener('click', () => {
      isPowerOn = !isPowerOn;
      if (isPowerOn) {
        faceplate.classList.add('power-on');
        ledA.style.opacity = "1";
        ledB.style.opacity = "1";
        apmsText.style.fill = "var(--led-green)";
      } else {
        faceplate.classList.remove('power-on');
        isTrayOpen = false;
        faceplate.classList.remove('tray-open');
        ledA.style.opacity = "0.2";
        ledB.style.opacity = "0.2";
        apmsText.style.fill = "#2d632d";
      }
    });

    // Loading Motor Mechanism Toggle
    loadingBtn.addEventListener('click', () => {
      if (!isPowerOn) return; 
      isTrayOpen = !isTrayOpen;
      faceplate.classList.toggle('tray-open', isTrayOpen);
    });

    // Speed Selector Multi-state Realism
    document.querySelectorAll('.wide-btn, .apms-btn, .rect-btn:not(#loadingBtn)').forEach(button => {
      button.addEventListener('click', () => {
        if (!isPowerOn) return;
        if(button.id === 'sideBtn' || button.id === 'bothSidesBtn') {
          dynamicSpeed = dynamicSpeed === 33 ? 45 : 33;
          led33.classList.toggle('active', dynamicSpeed === 33);
          led45.classList.toggle('active', dynamicSpeed === 45);
        }
      });
    });
  </script>
</body>
</html>
